run_id: starvla_qwenoft_robochallenge_table30v2_shred_paper
run_root_dir: results/Checkpoints
seed: 42
wandb_entity: your_wandb_entity
wandb_project: starVLA_robochallenge_table30v2
is_debug: false
version_id: "0.21"

# Walk-through config: lightweight smoke test using Qwen3.5-0.8B + QwenPI_v3.
# action_dim=8 = ee_positions(7 quat: tx,ty,tz,rx,ry,rz,rw) + gripper_width(1)
# state_dim=7  = joint_positions(6) + gripper_width(1)
framework:
  name: QwenOFT
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen3.5-0.8B
    attn_implementation: sdpa
  action_model:
    action_dim: 8
    state_dim: 7
    action_horizon: 8

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    include_state: false
    data_root_dir: playground/Datasets/RoboChallenge_table30v2
    data_mix: robochallenge_table30v2_shred_paper
    action_type: delta_ee
    sequential_step_sampling: false
    per_device_batch_size: 2
    load_all_data_for_training: true
    obs_image_size: [224, 224]
    delete_pause_frame: false
    video_backend: torchvision_av

trainer:
  # Walk-through: 100 steps to validate the pipeline end-to-end.
  max_train_steps: 100
  num_warmup_steps: 10
  save_interval: 100
  eval_interval: 1000
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 5
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  gradient_checkpointing: true

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
