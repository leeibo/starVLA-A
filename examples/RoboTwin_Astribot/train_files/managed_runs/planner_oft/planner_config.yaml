run_id: planner_oft_planner
run_root_dir: results/Checkpoints
seed: 42
wandb_entity: leeibo-beihang-university
wandb_project: starVLA-RoboTwin-Astribot
is_debug: false
version_id: "0.21"

framework:
  name: QwenPlannerVLM
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen3-VL-2B-Instruct
    attn_implementation: flash_attention_2

datasets:
  vlm_data:
    dataset_py: planner_oft_datasets
    dataformat: planner_oft_lerobot
    model_type: qwen3vl
    model_max_length: 4096
    max_pixels: 50176
    min_pixels: 784
    video_max_pixels: 50176
    video_min_pixels: 784
    video_max_frames: 16
    video_min_frames: 2
    video_fps: 1
    per_device_batch_size: 8
    include_state: false
    num_workers: 4
    pin_memory: true
    data_root_dir: playground/dataset/RoboTwin_Astribot_lerobot
    data_mix: robotwin_astribot
    action_mode: abs
    video_backend: torchvision_av
    CoT_prompt: 'Your task is: "{instruction}" The input images are ordered from earliest to latest, and the last image is the current view. Please think about the current subtask and which frame(s) among the input images are worth remembering . Your response should be in the format of: <think>...</think><subtask>...</subtask><retrieval>...</retrieval>.'
    prompt_instruction_source: instruction
    prompt_instruction_key: lang
    think_answer:
      instruction_source: subtask_instruction
      instruction_key: subtask_lang
      template: '<think>Frames: {num_frames} total ({num_history} history + current). Now the subtask is "{subtask_instruction}"</think><subtask>{subtask_instruction}</subtask><retrieval>{retrieval_indices}</retrieval>'
    history:
      enabled: true
      mode: planner_vlm
      camera_key: video.camera_head
      stride: 16
      max_frames: 12
      subtask_keyframe_column: subtask_keyframe
      subtask_instruction_column: subtask_instruction

trainer:
  is_resume: false
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 5000
  eval_interval: 1000
  learning_rate:
    base: 1e-05
    qwen_vl_interface: 1.0e-05
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-07
  freeze_modules: ''
  loss_scale:
    vlm: 1.0
  logging_frequency: 10
  gradient_clipping: 1.0

  optimizer:
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
